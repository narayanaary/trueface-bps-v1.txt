<!DOCTYPE html>
<html>
<head>
    <title>TrueFace BPS</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f9; }
        #drop-zone { border: 2px dashed #ccc; padding: 40px; background: white; border-radius: 10px; text-align: center; width: 300px; }
        input { margin-top: 15px; padding: 8px; width: 90%; }
    </style>
</head>
<body>
    <div id="drop-zone" ondrop="handleDrop(event)" ondragover="event.preventDefault()">
        <h3>TrueFace BPS</h3>
        <p>Drop image here</p>
        <input type="text" id="licenseKey" placeholder="Enter License Key">
    </div>

    <script>
        async function handleDrop(event) {
            event.preventDefault();
            const file = event.dataTransfer.files[0];
            const key = document.getElementById('licenseKey').value;
            const formData = new FormData();
            formData.append('file', file);
            formData.append('key', key);

            const response = await fetch('https://YOUR-RENDER-URL.onrender.com/verify', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            alert(JSON.stringify(result));
        }
    </script>
</body>
</html>
